<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <title>AhorrAdas-E4</title>
</head>
<body>
  <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 HEADER 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->
  <!-- ❗❗❗❗❗❗❗❗❗ ATENCION: ANTES DEL PULL REQUEST A DEVELOP Y A MAIN , HACER O ELIMINAR CAMBIOS DEL HEADER ❗❗❗❗❗❗❗❗❗ -->
  <header class="h-38 bg-[#212531] flex flex-col md:h-50">
    <!-- .......................... LOGO .................... -->
    <div class="flex">
      <img class="w-16 rounded-full translate-x-4 translate-y-3 md:w-44 md:translate-x-6 md:translate-y-5" src="./style/images/1-logo-ahorradas.jpg" alt="logo de la aplicación" >
      <span class="text-[#cacccd] -translate-x-1 translate-y-7 text-2xl md:-translate-x-6 md:translate-y-20 md:text-6xl">horrADAs</span>
    </div>

    <!-- .............. BUTTONS (hamburger/close) ............ -->
    <div id="wrapper-buttons-menu" class="relative ml-[85%]">
      <button id="button-hamburger-menu">
        <img  src="./style/images/2-menu-hamburger.png" alt="icono menu hamburguesa" class="w-6 -translate-y-7 md:w-16 md:-translate-y-24">
      </button>
      
      <button id="button-close-menu" class=" hidden" >
        <img  src="./style/images/3-close-menu.png" alt="icono de cerrar" class=" w-4 -translate-y-7 translate-x-1  md:w-14 md:-translate-y-24 ">
      </button>
    </div>

    <!-- ............. NAV / BUTTONS-VIEW-SECTIONS ........... -->
    <nav class= "hidden w-full">

      <div id="wrapper-buttons-view-sections" class= "bg-[#ffe471] shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] flex flex-col gap-2 pt-3 pb-4 " >
        
        <button id="button-view-balance" class= "h-7 text-start bg-[#ffe471] hover:bg-yellow-100 border-none md:h-14 md:text-4xl md:pl-3 " >
          <i class="fa-solid fa-money-bill-trend-up m-2 md:m-4 "></i>Balance
        </button>

        <button id="button-view-categories" class= "h-7 text-start bg-[#ffe471] hover:bg-yellow-100 border-none md:h-14 md:text-4xl md:pl-3" >
          <i class="fa-solid fa-money-bill-trend-up m-2 md:m-4"></i>Categorias
        </button>

        <button id="button-view-report" class= "h-7 text-start bg-[#ffe471] hover:bg-yellow-100 border-none md:h-14 md:text-4xl md:pl-3" >
          <i class="fa-solid fa-money-bill-trend-up m-2 md:m-4"></i>Reportes
        </button>

      </div>
    </nav>
  </header>
  <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->

  <main class="bg-[#c9c9ca] flex flex-col items-center gap-20 ">
    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 VIEW BALANCE HOME 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->
    <section id="view-balance-home" class=" flex flex-col items-center">
      <!-- ******************************** BALANCE ******************************** -->
      <section id="balance-section" class="w-72 min-h-72 bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mt-16 mb-14 md:w-5/6">
        <h2 class="text-3xl font-medium pl-2 mt-3">Balance</h2>
        
        <!-- ------------------- profits ------------------- -->
        <div id="wrapper-profits" class="flex justify-between pr-3 mt-12">
          <p class=" text-2xl pl-2">Ganancias</p>
          <span class="text-green-600 text-2xl font-medium">+$</span>
        </div>

        <!-- ------------------- expenses ------------------- -->
        <div id="wrapper-expenses" class="flex justify-between pr-3 mt-5">
          <p class=" text-2xl pl-2">Gastos</p>
          <span class="text-red-600 text-2xl font-medium">-$</span>
        </div>

        <!-- ------------------- total ------------------- -->
        <div id="wrapper-total" class="flex justify-between pr-3 mt-5">
          <p class=" text-2xl pl-2">Total</p>
          <span class="text-2xl font-medium">$0</span>
        </div>

      </section>

      <!-- ******************************** FILTERS ******************************** -->
      <section id="filters-section" class="w-72 min-h-[30rem] bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mb-14  md:w-5/6 ">
        <h2 class="text-3xl font-medium pl-2 mt-3">Filtros</h2>
        <button id="button-hide-filters" class= "text-blue-600 relative translate-x-40 -translate-y-6  md:h-14 md:text-4xl md:pl-3 " >Ocultar Filtros</button>

        <!-- ------------------- filter-type ------------------- -->
        <div id="wrapper-filter-type" class="m-2 flex flex-col gap-2">
          <label for="filter-type">Tipo</label>
          <select name="" id="filter-type" class="border-4 rounded-xl p-2">
            <option value="">Todos</option>
            <option value="">Gasto</option>
            <option value="">Ganancia</option>
          </select>
        </div>

        <!-- --------------- filter-categories --------------- -->
        <div id="wrapper-filter-categories" class="m-2 flex flex-col gap-2">
          <label for="filter-categories">Categorías</label>
          <select name="" id="filter-categories" class="border-4 rounded-xl p-2">
            <option value="">Todas</option>
            <option value="">Comida</option>
            <option value="">Servicios</option>
            <option value="">Salidas</option>
            <option value="">Servicios</option>
            <option value="">Servicios</option>
            <option value="">Trabajo</option>
          </select>
        </div>

        <!-- -------------------- flter date -------------------- -->
        <div id="wrapper-filter-date" class="m-2 flex flex-col gap-2">
          <label for="filter-date">Desde</label>
          <input type="date" name="date" id="filter-date" class=" border-4 rounded-xl p-2">
        </div>

        <!-- -------------------- filter order -------------------- -->
        <div id="wrapper-filter-order" class="m-2 flex flex-col gap-2">
          <label for="filter-order">Ordenar por</label>
          <select name="order" id="filter-order" class=" border-4 rounded-xl p-2">
            <option value="">Más reciente</option>
            <option value="">Menos reciente</option>
            <option value="">Mayor monto</option>
            <option value="">Mayor monto</option>
            <option value="">A/Z</option>
            <option value="">Z/A</option>
          </select>
        </div>

      </section>

      <!-- ******************************** OPERATIONS ******************************** -->
      <section id="operations-section" class="w-72 min-h-[40rem] bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mb-9 md:w-5/6 ">
        <h2 class="text-3xl font-medium pl-2 mt-3">Operaciones</h2>
        <button id="button-new-operation" class= "text-blue-600  md:h-14 md:text-4xl md:pl-3 " >+Nueva operación</button>
      </section>
        
    </section>
        <!-- -------------------- new operation -------------------- -->
        <section id="new-operation" class="hidden w-72 h-[40rem] bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mt-16 md:w-5/6 ">
          <h2 class="text-3xl font-medium pl-2 mt-3">Nueva operación</h2>
          <form id="form-create-new-operation" action="">

            <!-- ------------- description-new-operation ------------- -->
            <div id="wrapper-description-new-operation" class="m-2 flex flex-col">
              <label for="description-new-operation" class="m-1">Descripción</label>
              <input type="text" name="description-new-operation" id="description-new-operation" class=" border-4 rounded-xl p-2">
            </div>
            
            <!-- --------------- amount-new-operation --------------- -->
            <div id="wrapper-amount-new-operation" class="m-2 flex flex-col ">
              <label for="amount-new-operation" class="m-1">Monto</label>
              <input type="number" name="amount-new-operation" id="amount-new-operation" class=" border-4 rounded-xl p-2">
            </div>
            
            <!-- ---------------- type-new-operation ---------------- -->
            <div id="wrapper-type-new-operation" class="m-2 flex flex-col">
              <label for="type-new-operation" class="m-1">Tipo</label>
              <select name="type" id="type-new-operation" class="border-4 rounded-xl p-2">
                <option value="">Gasto</option>
                <option value="">Ganancia</option>
              </select>
            </div>
            
            <!-- --------------- categories-new-operation --------------- -->
            <div id="wrapper-categories-new-operation" class="m-2 flex flex-col ">
              <label for="categories-new-operation" class="m-1">Categorías</label>
              <select name="" id="filter-categories" class="border-4 rounded-xl p-2">
                <option value="">Comida</option>
                <option value="">Servicios</option>
                <option value="">Salidas</option>
                <option value="">Servicios</option>
                <option value="">Servicios</option>
                <option value="">Trabajo</option>
              </select>
            </div>
            
            <!-- ------------- date-new-operation ------------- -->
            <div id="wrapper-date-new-operation" class="m-2 flex flex-col ">
              <label for="date-new-operation" class="m-1">Fecha</label>
              <input type="date" name="date-new-operation" id="date-new-operation" class=" border-4 rounded-xl p-2">
            </div>

            <div id="wrapper-buttons-new-operation" class="flex gap-3 mt-10 ml-14">
              <button id="button-cancel-new-operation" type="submit" class="w-24  h-12 bg-gray-300 border-none rounded-lg p-3">Cancelar</button>
              <button id="button-add-new-operation" type="submit" class="w-24 h-12 bg-blue-300 border-none rounded-lg p-3">Agregar</button>
            </div>
            
            <!-- conectado con boton de operations-view-sections -->
          </form>
        </section>


    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->

    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 VIEW CATEGORIES 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->
    <section id="view-categories" class="hidden w-72 h-[40rem] bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mt-16  md:w-5/6">
      <h2 class="text-4xl font-medium pl-2 mt-3">Categorías</h2>
      <div id="wrapper-name-view-categories" class="m-2 flex flex-col gap-2">
        <label for="name-categories">Nombre</label>
        <input type="text" name="name" id="name-categories" class="border-4 p-2">
      </div>
    </section>
    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->

    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 VIEW REPORT 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->
    <section id="view-report" class="hidden w-72 h-[40rem] bg-gray-100 rounded-xl shadow-[1px_20px_16px_1px_rgb(0,0,0,0.3)] p-2 mt-16 md:w-5/6">
      <h2 class="text-4xl font-medium pl-2 mt-3">Reportes</h2>
    </section>
    <!-- 💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥💥 -->
  </main>

  <script src="https://kit.fontawesome.com/e010b89ab9.js" crossorigin="anonymous"></script>
  <script src="main.js"></script>
</body>
</html>
